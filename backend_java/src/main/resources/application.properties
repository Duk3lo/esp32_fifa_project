server.port=8081

# Base de datos: usa variables de entorno en vez de credenciales fijas en el repo.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fifa2026}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# El ESP32 se anuncia por mDNS como "esp32.local" (ver firmware/src/wifi/mdns.rs),
# así que usamos ese hostname por defecto en vez de una IP fija que el DHCP
# del router puede cambiar en cualquier momento. Si tu red no resuelve .local,
# sobreescribe con variables de entorno (ESP32_URL / ESP32_WS) usando la IP fija.
esp32.url=${ESP32_URL:http://esp32.local}
esp32.ws=${ESP32_WS:ws://esp32.local/ws}